name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5 # v5 natively supports Node 24 runners

      - name: Setup Node
        uses: actions/setup-node@v5 # v5 natively supports Node 24 runners
        with:
          node-version: 24 
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Add .nojekyll
        run: touch dist/.nojekyll 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3 # v3 remains standard for Pages logic
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # Matches the v5 logic for the runner