name: Hive Telemetry Sync

on:
  schedule:
    - cron: '0 */3 * * *' # Every 3 hours, at the top of the hour (UTC)
  workflow_dispatch: # Allows manual trigger

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Fetch & Process Hive Data
        run: python scripts/fetch_weather.py
        
      - name: Commit Data
        run: |
          git config user.name "BeeBot"
          git config user.email "actions@github.com"
          git add src/data/hive_metrics.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update daily hive telemetry [skip ci]" && git push)

      # Build and Deploy step is already in deploy.yml
      # This push will trigger deploy.yml if not [skip ci]
      # But we might want to consolidate or just let push trigger it.
